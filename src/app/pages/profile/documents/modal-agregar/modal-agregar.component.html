<div id="add_publicidad" class="offcanvas offcanvas-bottom rounded-top-5 h-75"
    style="height: auto; max-height: 60vh; border-radius: 25px 25px 0 0;">
    <div class="offcanvas-header border-bottom py-3">
        <h5 class="offcanvas-title fw-bold text-primary">{{'formulario.Add Files'|translate}}</h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" (click)="closeReload()"></button>
    </div>
    <div class="offcanvas-body p-4">
        <p>{{'formulario.Allowed Files'|translate}}: jpg, jpeg, gif, pdf|
            {{'formulario.Max Weight'|translate}}: 1024kb</p>
        <br>
        <div class="row">
            <form [formGroup]="documentForm" *ngIf="!isLoading">
                <div class="col-12 col-sm-6">
                    <label class="labelgoogle">
                        <input class="form-control input" formControlName="name_category" type="text" required>
                        <span class="label__name">
                            {{'Category'|translate}}<span class="login-danger">*</span>

                        </span>
                    </label>
                </div>

                <div class="d-flex flex-column align-items-center gap-2 mt-3">

                    <!-- CASO 1: Si es una Imagen -->
                    <img *ngIf="!esPdf && archivoSubir" [src]="vistaPreviaTemp" class="img-thumbnail"
                        style="width: 120px; height: 120px; object-fit: cover;" alt="Vista previa imagen">

                    <!-- CASO 2: Si es un PDF (Requiere bypass de seguridad de Angular) -->
                    <iframe *ngIf="esPdf && archivoSubir && vistaPreviaTemp" [src]="vistaPreviaTemp | safeUrl" style="width: 120px; height: 120px; object-fit: cover;">
                    </iframe>

                    <div class="input-group">
                        <label class="btn btn-outline-secondary w-100 rounded-pill mb-2">
                            <i class="bi bi-camera me-2"></i> Elegir Archivo
                            <input type="file" accept="image/*, application/pdf" (change)="cambiarImagen($event)"
                                hidden>
                        </label>

                        <button type="button" (click)="enviarAlPadre()"
                            class="btn btn-success w-100 rounded-pill shadow-sm">
                            <i class="bi bi-cloud-arrow-up me-2"></i> Confirmar Cambio
                        </button>
                    </div>
                </div>

            </form>

        </div>


    </div>
</div>
