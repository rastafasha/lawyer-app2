      <div class="col-xs-12 col-sm-9 col-md-9">
    
        <app-backButtn [pageTitle]="pageTitle"></app-backButtn>
        
        <div *ngIf="user.role === 'MEMBER' || user.role === 'USER'">
          <!-- aviso falta info -->
          <app-aviso  [profile]="profile" [user]="user"></app-aviso>

          <app-fichaprofile *ngIf="profile && user" [isLoading]="isLoading" [profile]="profile" [user]="user" [redessociales]="redessociales" [speciality]="speciality"></app-fichaprofile>

          <app-solicitudes-recents  [user]="user"></app-solicitudes-recents>

          <!---Slider-->
          

        </div>
        
        <div *ngIf="user.role === 'SUPERADMIN' || user.role === 'ADMIN'">
         <app-ListaUsuarios [users]="users"></app-ListaUsuarios>
        </div>
      </div>
      <!-- lateral -->
      <div class="col-xs-12 col-sm-3 col-md-3">
        <app-lateral></app-lateral>

    </div>
   </div>
