<app-header></app-header> 

<div class="playground"> 
  <div class="card"> 
    
    <!-- Profile Top Bar Header -->
    @if (profile) {
      <div class="card-body-top"> 
        <div class="fotoperfil"> 
          <img [src]="(profile.img || '') | imagenPipe: 'profiles'" alt="Perfil"> 
        </div> 
        <div class="perfil"> 
          <h2 class="name">{{ profile.first_name }} {{ profile.last_name }}</h2> 
          <h4 class="job-title">{{ profile.ciudad }}, {{ profile.pais }}</h4> 
        </div> 
        <div class="actions"> 
          <app-backButtn [pageTitle]="pageTitle"></app-backButtn> 
        </div> 
      </div> 
    }
    
    <div class="clear"></div> 

    <!-- Chat Area Section -->
    <div style="margin-top: 120px;"> 
      <div class="chat-container"> 
        
        <!-- Live Real-Time Message View List -->
        <div class="messages-list"> 
          @for (msg of messages(); track msg.id || msg.fecha) { 
            <!-- Adjust condition logic based on your backend message schema properties -->
            <div [ngClass]="{'mi-mensaje': msg.user_id === user.id, 'su-mensaje': msg.user_id !== user.id}"> 
              <p>{{ msg.message || msg.texto }}</p> 
            </div> 
          } @empty {
            <p class="text-center text-muted">No hay mensajes anteriores. ¡Empieza la conversación!</p>
          }
        </div> 
        
      </div> 
    </div> 

    <!-- Consolidated Unified Input Box Bar Form -->
    <form class="escribir_data" (submit)="$event.preventDefault()"> 
      <input 
        type="text" 
        name="message" 
        class="textinput" 
        [(ngModel)]="message" 
        (keyup.enter)="enviarMensaje()" 
        placeholder="Escribe un mensaje..."
        autocomplete="off"> 
      
      <button 
        type="button" 
        class="btn btn-outline-success butonhome" 
        (click)="enviarMensaje()">
        <i class="fa fa-arrow-circle-right" aria-hidden="true"></i>
      </button> 
    </form> 

  </div> 
</div>
